# magi@develtail:~$ cat ~/.config/tmux/tmux.conf
# ============================================
# ESSENTIAL SETTINGS
# ============================================

# Fix Vim ESC delay: Vim と tmux を併用した時の ESC key の delay を無くす
set -sg escape-time 0

# Increase scrollback buffer: 履歴の行数を増やす
set -g history-limit 50000

# Start windows and panes at 1, not 0: Window と pane の開始番号を 0 から 1 に変更する
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support: マウス操作を可能にする
set -g mouse on

# Enable focus events for vim autoread
set -g focus-events on

# Set terminal with proper colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Aggressive resize for multi-client
setw -g aggressive-resize on

# ============================================
# KEY BINDINGS
# ============================================

# Change prefix to Ctrl+a: prefix key を Ctrl+a へ変更
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config: Ctrl+a -> r で tmux.conf をリロード
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Better pane splitting (and keep current path): 分割後の pane の現在のパスで開く
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation: meta(Alt) + hjkl で pane の移動
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Vim-style pane resizing: prefix + hjkl で pane サイズの変更
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# ============================================
# APPEARANCE
# ============================================

# don't do anything when a 'bell' rings: ベルを鳴らさない
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# panes: pane 間の基本的なボーダーカラーとアクティブな pane のボーダーカラーを設定
set -g pane-border-style 'fg=yellow'
set -g pane-active-border-style 'fg=red'

# Status bar update interval: Status bar の更新間隔
set-option -g status-interval 5

# Status bar position: Status bar の位置
# Status bar の位置, 左寄せ, 背景色を設定
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=black'

# 左 Status bar の文字色, 背景色, message, 幅
set -g status-left-style 'fg=blue bg=black'
# set -g status-left '(> -)つ '
set -g status-left "#{?client_prefix,#[bg=black]#[fg=yellow] (／・ω・)  ,#[bg=black]#[fg=white] (」・ω・)  }"
set -g status-left-length 10

# 右 Status bar の文字色, 背景色, message, 幅
set -g status-right-style 'fg=white bg=black'
# set -g status-right '%Y-%m-%d %H:%M '
set -g status-right "local: #(hostname -I | awk '{print $1}') vpn: #(hostname -I | awk '{print $2}') "  # IP アドレスを表示
set -g status-right-length 50

# 中央 Status bar の文字色, 背景色, message (active なwindow)
setw -g window-status-current-style 'fg=black bg=red'
setw -g window-status-current-format ' #I #W #F '

# 中央 Status bar の文字色, 背景色, message (not active なwindow)
setw -g window-status-style 'fg=red bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

set -g message-style 'fg=yellow bg=red bold'

# ============================================
# COPY MODE
# ============================================

# Use vi keys
setw -g mode-keys vi

# Vi-style copy bindings
bind -T copy-mode-vi v send -X begin-selection
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"  # macOS
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"  # Linux

# ============================================
# PLUGINS (via TPM)
# ============================================

# Install TPM first:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin settings
set -g @resurrect-strategy-vim 'session'
set -g @continuum-restore 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
